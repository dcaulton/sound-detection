name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Install Torch (CPU for CI)
        run: uv pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu

      - name: Install tensorflow-cpu (required for BirdNET)
        run: uv pip install tensorflow-cpu

      - name: Install editable package
        run: uv pip install -e .

      - name: Run ruff
        run: uv run ruff check .

      - name: Run ruff format check
        run: uv run ruff format --check .

      - name: Run mypy
        run: uv run mypy src

      - name: Run tests
        run: uv run pytest
